<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGenie — Your AI Study Partner</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}?v=3.0">
</head>
<body>

  <!-- Theme Toggle Floating Button -->
  <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle Theme">🌙</button>

  <!-- ============================================================ -->
  <!-- DEDICATED AUTHENTICATION SCREEN (Shown Separately) -->
  <!-- ============================================================ -->
  <div id="authScreen" class="auth-screen-container" style="display: flex;">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-logo">EduGenie 🧠✨</div>
        <p class="auth-subtitle">Your personal AI tutor for learning support!</p>
      </div>

      <div class="auth-tabs">
        <button id="tabLoginBtn" class="auth-tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
        <button id="tabRegisterBtn" class="auth-tab-btn" onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <!-- Login Panel -->
      <div id="loginPanel" class="auth-panel-content">
        <form onsubmit="event.preventDefault(); login();">
          <div class="auth-form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="name@domain.com" required>
          </div>
          <div class="auth-form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-full">Sign In</button>
        </form>
        <div id="loginError" class="auth-error"></div>
      </div>

      <!-- Register Panel -->
      <div id="registerPanel" class="auth-panel-content" style="display: none;">
        <form onsubmit="event.preventDefault(); handleRegistrationSubmit();">
          <div id="registerFieldsContainer">
            <div class="auth-form-group">
              <label for="regName">Full Name</label>
              <input type="text" id="regName" placeholder="John Doe" required>
            </div>
            <div class="auth-form-group">
              <label for="regEmail">Email Address</label>
              <input type="email" id="regEmail" placeholder="name@domain.com" required>
            </div>
            <div class="auth-form-group">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>
            <div class="auth-form-group">
              <label for="regConfirmPassword">Confirm Password</label>
              <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-full">Create Account</button>
          </div>
          
          <div id="registerOtpContainer" style="display: none;">
            <div class="auth-form-group">
              <label for="regOtp">Verification OTP</label>
              <input type="text" id="regOtp" placeholder="Enter 6-digit Code" autocomplete="one-time-code">
            </div>
            <button type="button" onclick="verifyRegistrationOTP()" class="btn btn-full" style="margin-bottom: 12px;">Verify & Create Account</button>
            <button type="button" onclick="resendRegistrationOTP()" class="btn btn-full btn-outline">Resend OTP</button>
          </div>
        </form>
        <div id="registerStatus" class="auth-status" style="margin-top: 15px; text-align: center;"></div>
      </div>

      <div class="auth-card-footer">
        <div class="divider">
          <span class="divider-text">or</span>
        </div>
        <button onclick="loginAsGuest()" class="btn btn-full btn-outline btn-guest">Continue as Guest</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MAIN APP WORKSPACE DASHBOARD (Hidden until Logged In) -->
  <!-- ============================================================ -->
  <div id="mainDashboard" style="display: none;">
    <!-- Top Navigation Bar -->
    <header class="top-nav">
      <div class="top-nav-container">
        <div class="logo">EduGenie 🧠✨</div>
        <div class="auth-section">
          <span class="user-welcome">Welcome, <strong id="authName"></strong>!</span>
          <span id="guestBadge" class="guest-badge" style="display: none; margin-left: 10px; margin-right: 10px;">Guest Mode Active</span>
          <button onclick="logout()" class="btn btn-sm btn-outline">Sign Out</button>
        </div>
      </div>
    </header>

    <!-- Main Workspace Container -->
    <div class="container">
      <div class="hero">
        <h1 class="hero-title">Welcome to EduGenie 🧠✨</h1>
        <p class="hero-subtitle">Your personal AI tutor for learning support!</p>
      </div>

      <!-- 01. Q&A -->
      <section class="section">
        <form id="qaForm" class="tool-form">
          <div class="form-group-horizontal">
            <label for="question"><strong>Ask EduGenie a Question:</strong></label>
            <div class="input-row">
              <input type="text" id="question" placeholder="Why is the sky blue?" required>
              <button type="submit" class="btn">Get Answer</button>
            </div>
          </div>
        </form>
        <div id="qaResult" class="output"></div>
      </section>

      <!-- 02. Explanation -->
      <section class="section">
        <form id="explainForm" class="tool-form">
          <div class="form-group-horizontal">
            <label for="topic"><strong>Need an Explanation?</strong></label>
            <div class="input-row">
              <input type="text" id="topic" placeholder="Photosynthesis" required>
              <button type="submit" class="btn">Explain</button>
            </div>
          </div>
        </form>
        <div id="explanationResult" class="output"></div>
      </section>

      <!-- 03. Summarization -->
      <section class="section">
        <form id="summaryForm" class="tool-form">
          <div class="form-group-horizontal">
            <label for="summaryText"><strong>Summarize a Paragraph:</strong></label>
            <div class="input-row">
              <input type="text" id="summaryText" placeholder="Paste long content to summarize" required>
              <button type="submit" class="btn">Summarize</button>
            </div>
          </div>
        </form>
        <div id="summaryResult" class="output"></div>
      </section>

      <!-- 04. Quiz -->
      <section class="section">
        <form id="quizForm" class="tool-form">
          <div class="form-group-horizontal">
            <label for="quizText"><strong>Generate a Quiz:</strong></label>
            <div class="input-row">
              <input type="text" id="quizText" placeholder="Solar System" required>
              <button type="submit" class="btn">Generate Quiz</button>
            </div>
          </div>
        </form>
        <div id="quizResult" class="output"></div>
      </section>

      <!-- 05. Learning Recommendations -->
      <section class="section">
        <form id="recommendForm" class="tool-form">
          <div class="form-group-horizontal">
            <label for="recommendTopic"><strong>Get Learning Recommendations:</strong></label>
            <div class="input-row">
              <input type="text" id="recommendTopic" placeholder="e.g. Linear Regression" required>
              <button type="submit" class="btn">Get Recommendations</button>
            </div>
          </div>
        </form>
        <div id="recommendResult" class="output"></div>
      </section>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- JAVASCRIPT: Auth Flows, Fetch API, and Quiz Evaluators -->
  <!-- ============================================================ -->
  <script>
    // Check session on startup
    async function checkCurrentUser() {
      try {
        const response = await fetch('/current-user');
        const data = await response.json();
        
        const authScreen = document.getElementById('authScreen');
        const mainDashboard = document.getElementById('mainDashboard');
        const guestBadge = document.getElementById('guestBadge');
        
        if (data.logged_in) {
          document.getElementById('authName').textContent = data.name;
          
          if (data.email === 'guest@edugenie.com') {
            guestBadge.style.display = 'inline-block';
          } else {
            guestBadge.style.display = 'none';
          }
          
          // Toggle screens
          authScreen.style.display = 'none';
          mainDashboard.style.display = 'block';
        } else {
          // Toggle screens
          authScreen.style.display = 'flex';
          mainDashboard.style.display = 'none';
        }
      } catch (err) {
        console.error("Auth status validation check failed:", err);
      }
    }

    // Global Verification state
    let pendingVerificationEmail = "";

    // Toggle Sign In / Create Account Tabs
    function switchAuthTab(tab) {
      const loginPanel = document.getElementById('loginPanel');
      const registerPanel = document.getElementById('registerPanel');
      const tabLoginBtn = document.getElementById('tabLoginBtn');
      const tabRegisterBtn = document.getElementById('tabRegisterBtn');
      
      // Clear inputs and messages
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('regName').value = '';
      document.getElementById('regEmail').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regConfirmPassword').value = '';
      document.getElementById('regOtp').value = '';
      
      document.getElementById('loginError').textContent = '';
      document.getElementById('registerStatus').textContent = '';
      
      // Reset signup OTP toggles
      document.getElementById('registerOtpContainer').style.display = 'none';
      document.getElementById('registerFieldsContainer').style.display = 'block';
      pendingVerificationEmail = "";
      
      if (tab === 'login') {
        loginPanel.style.display = 'block';
        registerPanel.style.display = 'none';
        tabLoginBtn.classList.add('active');
        tabRegisterBtn.classList.remove('active');
      } else {
        loginPanel.style.display = 'none';
        registerPanel.style.display = 'block';
        tabLoginBtn.classList.remove('active');
        tabRegisterBtn.classList.add('active');
      }
    }

    // Registered user login
    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      errorDiv.textContent = '';

      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error || 'Login failed.';
          return;
        }

        // Login completed successfully
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        checkCurrentUser();
      } catch (err) {
        errorDiv.textContent = 'Server connection error.';
      }
    }

    // Initial Registration submission
    async function handleRegistrationSubmit() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const statusDiv = document.getElementById('registerStatus');
      
      statusDiv.textContent = '';
      statusDiv.style.color = '#dc2626';

      if (!name || !email || !password || !confirmPassword) {
        statusDiv.textContent = 'Please fill in all fields.';
        return;
      }

      if (password !== confirmPassword) {
        statusDiv.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await response.json();
        
        if (!response.ok) {
          statusDiv.textContent = data.error || 'Registration failed.';
          return;
        }

        if (data.verification_required) {
          pendingVerificationEmail = email;
          // Toggle input screens
          document.getElementById('registerFieldsContainer').style.display = 'none';
          document.getElementById('registerOtpContainer').style.display = 'block';
          
          statusDiv.style.color = '#6366f1';
          statusDiv.innerHTML = data.message;
        }
      } catch (err) {
        statusDiv.textContent = 'Server connection error.';
      }
    }

    // OTP Verification submission
    async function verifyRegistrationOTP() {
      const otp = document.getElementById('regOtp').value.trim();
      const statusDiv = document.getElementById('registerStatus');
      statusDiv.textContent = '';
      statusDiv.style.color = '#dc2626';

      if (!otp) {
        statusDiv.textContent = 'Please enter the verification OTP.';
        return;
      }

      try {
        const response = await fetch('/verify-registration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingVerificationEmail, otp })
        });
        const data = await response.json();

        if (!response.ok) {
          statusDiv.textContent = data.error || 'Verification failed.';
          return;
        }

        statusDiv.style.color = '#059669';
        statusDiv.textContent = 'Account verified and created successfully!';
        
        // Clean up registration fields
        document.getElementById('regName').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirmPassword').value = '';
        document.getElementById('regOtp').value = '';
        
        // Restore standard panels
        document.getElementById('registerOtpContainer').style.display = 'none';
        document.getElementById('registerFieldsContainer').style.display = 'block';
        
        // Auto sign-in verified user
        setTimeout(() => checkCurrentUser(), 1000);
      } catch (err) {
        statusDiv.textContent = 'Server connection error.';
      }
    }

    // Resend OTP trigger
    async function resendRegistrationOTP() {
      const statusDiv = document.getElementById('registerStatus');
      statusDiv.textContent = '';
      statusDiv.style.color = '#dc2626';

      try {
        const response = await fetch('/resend-registration-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingVerificationEmail })
        });
        const data = await response.json();

        if (!response.ok) {
          statusDiv.textContent = data.error || 'Resending OTP failed.';
          return;
        }

        statusDiv.style.color = '#059669';
        statusDiv.textContent = data.message;
      } catch (err) {
        statusDiv.textContent = 'Server connection error.';
      }
    }

    // Guest mode sign in
    async function loginAsGuest() {
      try {
        const response = await fetch('/login-guest', { method: 'POST' });
        if (response.ok) {
          checkCurrentUser();
        }
      } catch (err) {
        console.error("Guest login failed:", err);
      }
    }

    // Session log out
    async function logout() {
      await fetch('/logout', { method: 'POST' });
      checkCurrentUser();
    }

    // Loader helper
    function setThinking(element) {
      element.innerHTML = 'Thinking...';
    }

    // Escape tags to secure outputs
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Markdown rendering parser
    function renderMarkdownLite(rawText) {
      const escaped = escapeHTML(rawText);
      const htmlLines = escaped.split('\n').map((line) => {
        let processed = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        if (/^###\s+/.test(processed)) {
          return `<h5>${processed.replace(/^###\s+/, '')}</h5>`;
        }
        if (/^##\s+/.test(processed)) {
          return `<h4>${processed.replace(/^##\s+/, '')}</h4>`;
        }
        if (/^\*\s+/.test(processed)) {
          return `<li>${processed.replace(/^\*\s+/, '')}</li>`;
        }
        return processed || '<br>';
      });
      return htmlLines.join('<br>');
    }

    // Q&A Integration
    const qaForm = document.getElementById('qaForm');
    const qaResult = document.getElementById('qaResult');

    qaForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      setThinking(qaResult);
      try {
        const response = await fetch(`/qa?question=${encodeURIComponent(question)}`);
        const data = await response.json();
        
        if (!response.ok) {
          qaResult.innerHTML = `<strong>Error:</strong> ${data.error || 'Failed to answer question.'}`;
          return;
        }

        qaResult.innerHTML = `<strong>Answer:</strong><br><br>${escapeHTML(data.answer)}`;
      } catch (err) {
        qaResult.innerHTML = `<strong>Error:</strong> Network connection error.`;
      }
    });

    // Explanation Integration
    const explainForm = document.getElementById('explainForm');
    const explanationResult = document.getElementById('explanationResult');

    explainForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = document.getElementById('topic').value.trim();
      if (!topic) return;

      setThinking(explanationResult);
      try {
        const response = await fetch('/explain/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });
        const data = await response.json();

        if (!response.ok) {
          explanationResult.innerHTML = `<strong>Error:</strong> ${data.error || 'Failed to generate explanation.'}`;
          return;
        }

        explanationResult.innerHTML = `<strong>Explanation:</strong><br><br>${escapeHTML(data.explanation)}`;
      } catch (err) {
        explanationResult.innerHTML = `<strong>Error:</strong> Network connection error.`;
      }
    });

    // Summarization Integration
    const summaryForm = document.getElementById('summaryForm');
    const summaryResult = document.getElementById('summaryResult');

    summaryForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('summaryText').value.trim();
      if (!text) return;

      setThinking(summaryResult);
      try {
        const response = await fetch('/summarize/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await response.json();

        if (!response.ok) {
          summaryResult.innerHTML = `<strong>Error:</strong> ${data.error || 'Failed to summarize.'}`;
          return;
        }

        summaryResult.innerHTML = `<strong>Summary:</strong><br><br>${escapeHTML(data.summary)}`;
      } catch (err) {
        summaryResult.innerHTML = `<strong>Error:</strong> Network connection error.`;
      }
    });

    // Quiz Integration
    const quizForm = document.getElementById('quizForm');
    const quizResult = document.getElementById('quizResult');

    quizForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('quizText').value.trim();
      if (!text) return;

      setThinking(quizResult);
      try {
        const response = await fetch('/quiz', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await response.json();

        if (!response.ok) {
          quizResult.innerHTML = `<strong>Error:</strong> ${data.error || 'Failed to generate quiz.'}`;
          return;
        }

        renderQuiz(quizResult, data.quiz);
      } catch (err) {
        quizResult.innerHTML = `<strong>Error:</strong> Network connection error.`;
      }
    });

    function renderQuiz(container, quiz) {
      container.innerHTML = '';
      
      const header = document.createElement('div');
      header.innerHTML = `<strong>Quiz:</strong><br><br>`;
      container.appendChild(header);

      if (!Array.isArray(quiz) || quiz.length === 0) {
        container.innerHTML += `Could not parse generated quiz. Please try a different topic.`;
        return;
      }

      quiz.forEach((item, qIndex) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'quiz-block';
        qBlock.style.marginBottom = '25px';

        const qTitle = document.createElement('div');
        qTitle.style.fontWeight = 'bold';
        qTitle.style.marginBottom = '8px';
        qTitle.textContent = `Q${qIndex + 1}: ${item.question}`;
        qBlock.appendChild(qTitle);

        const optsDiv = document.createElement('div');
        optsDiv.style.display = 'flex';
        optsDiv.style.flexDirection = 'column';
        optsDiv.style.gap = '6px';
        optsDiv.style.marginBottom = '12px';

        item.options.forEach((opt) => {
          const label = document.createElement('label');
          label.className = 'quiz-option-label';
          label.style.display = 'flex';
          label.style.alignItems = 'center';
          label.style.gap = '8px';
          label.style.padding = '6px 10px';
          label.style.borderRadius = '4px';
          label.style.cursor = 'pointer';
          label.style.border = '1px solid transparent';

          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = `quiz_q_${qIndex}`;
          radio.value = opt;

          label.appendChild(radio);
          label.append(opt);
          optsDiv.appendChild(label);
        });
        qBlock.appendChild(optsDiv);

        // Individual Check Answer button
        const checkBtn = document.createElement('button');
        checkBtn.type = 'button';
        checkBtn.className = 'btn btn-check';
        checkBtn.textContent = 'Check Answer';
        
        const feedback = document.createElement('div');
        feedback.style.marginTop = '8px';
        feedback.style.fontWeight = 'bold';

        checkBtn.addEventListener('click', () => {
          const selected = optsDiv.querySelector(`input[name="quiz_q_${qIndex}"]:checked`);
          const allOptions = optsDiv.querySelectorAll('.quiz-option-label');

          // Reset styles
          allOptions.forEach((lbl) => {
            lbl.style.backgroundColor = '';
            lbl.style.borderColor = 'transparent';
            lbl.style.color = '';
          });

          if (!selected) {
            feedback.style.color = '#d96c5b';
            feedback.textContent = 'Please choose an answer.';
            return;
          }

          const chosen = selected.value;
          const correct = item.answer;

          // Paint correct option green, incorrect red
          allOptions.forEach((lbl) => {
            const radVal = lbl.querySelector('input').value;
            if (radVal === correct) {
              lbl.style.backgroundColor = '#d1fae5';
              lbl.style.borderColor = '#34d399';
              lbl.style.color = '#065f46';
            } else if (chosen === radVal && chosen !== correct) {
              lbl.style.backgroundColor = '#fee2e2';
              lbl.style.borderColor = '#f87171';
              lbl.style.color = '#991b1b';
            }
          });

          if (chosen === correct) {
            feedback.style.color = '#059669';
            feedback.innerHTML = '&#9989; Correct!';
          } else {
            feedback.style.color = '#dc2626';
            feedback.innerHTML = `&#10060; Incorrect. Correct answer: ${escapeHTML(correct)}`;
          }
        });

        qBlock.appendChild(checkBtn);
        qBlock.appendChild(feedback);
        container.appendChild(qBlock);
      });
    }

    // Learning Recommendations Integration
    const recommendForm = document.getElementById('recommendForm');
    const recommendResult = document.getElementById('recommendResult');

    recommendForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = document.getElementById('recommendTopic').value.trim();
      if (!topic) return;

      setThinking(recommendResult);
      try {
        const response = await fetch(`/learn/recommendations?topic=${encodeURIComponent(topic)}`);
        const data = await response.json();

        if (!response.ok) {
          recommendResult.innerHTML = `<strong>Error:</strong> ${data.error || 'Failed to fetch recommendations.'}`;
          return;
        }

        const title = `<strong>Learning Recommendations for "${escapeHTML(data.topic)}":</strong><br><br>`;
        recommendResult.innerHTML = title + renderMarkdownLite(data.recommendation);
      } catch (err) {
        recommendResult.innerHTML = `<strong>Error:</strong> Network connection error.`;
      }
    });

    // Run auth state check on load
    window.addEventListener('DOMContentLoaded', checkCurrentUser);

    // Dark/Light Mode Theme Toggle Functions
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeToggleBtn');
      if (body.classList.contains('light-theme')) {
        body.classList.remove('light-theme');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      }
    }

    // Apply saved theme preference instantly
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('themeToggleBtn').textContent = '☀️';
      } else {
        document.body.classList.remove('light-theme');
        document.getElementById('themeToggleBtn').textContent = '🌙';
      }
    })();
  </script>

</body>
</html>
